services:
  web:
    build: ./php
    platform: linux/amd64
    container_name: php-app
    volumes:
      - ./php:/var/www/html
    ports:
      - "8085:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aKnfNZPyDFbL8Rq8MPzL
      MYSQL_DATABASE: lineup_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: bRng4y8TJLJwUxYHBD6q
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: aKnfNZPyDFbL8Rq8MPzL

volumes:
  db_data:
