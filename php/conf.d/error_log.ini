; Sla PHP errors op in een bestand dat leesbaar is door de app (voor feedback debug logs)
error_log = /var/www/html/api/php_errors.log
log_errors = On
display_errors = Off
date.timezone = Europe/Brussels

; Sessie instellingen: 30 dagen ingelogd blijven
session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000
session.save_path = /var/www/sessions
